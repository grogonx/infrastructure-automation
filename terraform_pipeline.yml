# =============================================================================
# terraform_pipeline.yml
# Description: GitHub Actions pipeline for Terraform infrastructure changes.
#              Runs fmt/validate/plan on every PR with the plan posted as a
#              comment. Applies automatically on merge to main.
# Author:      Joshua Harvey
#
# Required secrets:
#   AWS_ACCESS_KEY_ID      - AWS access key
#   AWS_SECRET_ACCESS_KEY  - AWS secret key
#   TF_API_TOKEN           - (Optional) Terraform Cloud token
# =============================================================================

name: Terraform Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform_pipeline.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "terraform/**"

env:
  TF_VERSION:   "1.7.0"
  AWS_REGION:   "ca-central-1"
  TF_WORK_DIR:  "./terraform"

permissions:
  contents:      read
  pull-requests: write   # Needed to post plan output as PR comment

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Validate (runs on every push and PR)
  # ---------------------------------------------------------------------------
  validate:
    name: Format & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform init -input=false

      - name: Terraform Format Check
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Job 2: Plan (runs on PRs — posts output as a PR comment)
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORK_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_WORK_DIR }}/plan_output.txt', 'utf8');
            const truncated  = planOutput.length > 65000
              ? planOutput.substring(0, 65000) + '\n\n... [truncated]'
              : planOutput;

            const status = '${{ steps.plan.outputs.exitcode }}' === '0' ? '✅ Success' : '❌ Failed';
            const body   = `## Terraform Plan ${status}

            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`

            </details>

            *Triggered by: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body:         body
            });

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1

  # ---------------------------------------------------------------------------
  # Job 3: Apply (runs on merge to main only)
  # ---------------------------------------------------------------------------
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production   # Requires manual approval in GitHub Environments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform apply -auto-approve -input=false

      - name: Output applied resources
        working-directory: ${{ env.TF_WORK_DIR }}
        run: terraform output
